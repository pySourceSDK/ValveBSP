[tox]
envlist = py{310,311,312,313}

requires =
    setuptools

[testenv]
deps =
    pytest
commands =
    pytest

[testenv:interactive]
basepython = python3.13
deps =
    pytest
    pytest-cov
    pytest-watch
commands =
    coverage erase
    ptw

[testenv:dev]
basepython = python3.13
deps =
    pytest
    pytest-cov
commands =
    coverage erase
    pytest --cov=valvebsp --cov-report html

[testenv:coverage]
basepython = python3.13
deps =
    pytest
    pytest-cov
    coverage-badge
    setuptools<81  # coverage-badge imports pkg_resources, removed in setuptools 81
commands =
    coverage erase
    pytest --cov=valvebsp --cov-report html
    coverage-badge -fo docs/source/coverage.svg

[testenv:docs]
basepython = python3.13
deps =
    sphinx<9  # sphinx-autodoc-construct is incompatible with Sphinx 9.x
    sphinx-autodoc-construct
    pytest
    pytest-cov
    coverage-badge
    setuptools<81  # coverage-badge imports pkg_resources, removed in setuptools 81
commands =
    coverage erase
    pytest --cov=valvebsp --cov-report html
    coverage-badge -fo docs/source/coverage.svg
    python -m sphinx docs/source/ docs/build/
