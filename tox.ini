[tox]
envlist = py{310,311,312,313}

requires =
    setuptools

[testenv]
deps =
    pytest
commands =
    pytest

[testenv:interactive]
basepython = python3.13
deps =
    pytest
    pytest-cov
    pytest-watch
commands =
    coverage erase
    pasteurize -w "valvebsp"
    ptw

[testenv:dev]
basepython = python3.13
deps =
    pytest
    pytest-cov
commands =
    coverage erase
    pasteurize -w "valvebsp"
    pytest --cov=valvebsp --cov-report html

[testenv:coverage]
basepython = python3.13
deps =
    pytest
    pytest-cov
    coverage-badge
commands =
    coverage erase
    pasteurize -w "valvebsp"
    pytest --cov=valvebsp --cov-report html
    coverage-badge -fo docs/source/coverage.svg

[testenv:docs]
basepython = python3.13
deps =
    sphinx
    sphinx-autodoc-construct
    pytest
    pytest-cov
    coverage-badge
commands =
    coverage erase
    pasteurize -w "valvebsp"
    pytest --cov=valvebsp --cov-report html
    coverage-badge -fo docs/source/coverage.svg
    python -m sphinx docs/source/ docs/build/
